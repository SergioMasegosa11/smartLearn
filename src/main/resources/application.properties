server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true

# NEU: Port explizit gesetzt, da SecurityConfig.corsConfigurationSource()
# den Origin "http://localhost:8080" fest eintraegt (Least Privilege:
# enge CORS-Konfiguration statt "*").
server.port=8080

# NEU (OWASP A09): Log-Level Feinsteuerung zusaetzlich zu logback-spring.xml
logging.level.bbw.lernkarten=DEBUG
logging.level.org.springframework.security=INFO
