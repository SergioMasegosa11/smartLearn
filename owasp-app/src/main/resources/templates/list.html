<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Cards</title>
</head>
<body>
<h1>Cards</h1>
<a th:href="@{/cards/new}">Create Card</a>
<table>
    <tr><th>Id</th><th>Title</th><th>Content</th><th>Actions</th></tr>
    <tr th:each="card : ${cards}">
        <td th:text="${card.id}"></td>
        <td th:text="${card.title}"></td>
        <td th:text="${card.content}"></td>
        <td>
            <a th:href="@{/cards/edit/{id}(id=${card.id})}">Edit</a>
            <form th:action="@{/cards/delete/{id}(id=${card.id})}" method="post" style="display:inline">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
</table>
</body>
</html>
